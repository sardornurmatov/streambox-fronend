<!DOCTYPE html>

<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo"><div class="logo-mark"></div>StreamBox</div>

    <div class="nav-group">
      <a href="home.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span data-i18n="home">Bosh sahifa</span>
      </a>
      <a href="#" class="nav-item disabled">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>
        <span data-i18n="shorts">Shorts</span>
      </a>
      <a href="#" class="nav-item" id="subsNavItem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/></svg>
        <span data-i18n="subscriptions">Obunalar</span>
      </a>
      <div id="sidebarSubscriptions" style="margin-top:2px;"></div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="nav-group">
      <div class="sidebar-toggle" id="youToggle">
        <span data-i18n="you">Siz</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <a href="#" class="nav-item" id="myChannelItem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        <span data-i18n="my_channel">Mening kanalim</span>
      </a>
      <a href="#" class="nav-item disabled">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span data-i18n="history">Tarix</span>
      </a>
      <a href="#" class="nav-item disabled">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h8"/></svg>
        <span data-i18n="playlists">Pleylistlar</span>
      </a>
      <a href="#" class="nav-item disabled">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>
        <span data-i18n="watch_later">Keyinroq ko'rish</span>
      </a>
      <a href="#" class="nav-item disabled">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-6 0v4H4l1 10a2 2 0 002 2h10a2 2 0 002-2l1-10h-6z"/></svg>
        <span data-i18n="liked_videos">Yoqtirilgan videolar</span>
      </a>
    </div>

    <div class="sidebar-divider"></div>

    <div class="nav-group">
      <div class="nav-label" data-i18n="categories">Kategoriyalar</div>
      <div id="sidebarCategories"></div>
    </div>

    <div class="nav-group" id="authNavGroup" style="margin-top:auto;"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="logo"><div class="logo-mark"></div>StreamBox</div>
      </div>

      <div class="topbar-center">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Qidirish" data-i18n-placeholder="search_placeholder">
        </div>
      </div>

      <div class="topbar-right">
        <button class="icon-btn" id="uploadBtn" title="Video yuklash">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </button>
        <button class="icon-btn" id="bellBtn" title="Bildirishnomalar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="dot" id="bellDot" style="display:none;"></span>
        </button>
        <div id="langSwitchMount"></div>
        <div id="rightAuthSlot"></div>
      </div>
    </div>

    <div class="categories-row" id="categoriesRow"></div>

    <div class="video-grid" id="videoGrid">
      <div class="loading-state" data-i18n="loading">Yuklanmoqda...</div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script src="js/layout.js"></script>
<script src="js/home.js"></script>

</html>
