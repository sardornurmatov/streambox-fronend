<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="create_channel">Kanal yaratish — StreamBox</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo"><div class="logo-mark"></div>StreamBox</div>
    <div class="nav-group">
      <a href="home.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span data-i18n="home">Bosh sahifa</span>
      </a>
    </div>
    <div class="nav-group" id="authNavGroup" style="margin-top:auto;"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo"><div class="logo-mark"></div>StreamBox</div>
      </div>
      <div class="topbar-center"></div>
      <div class="topbar-right">
        <div id="langSwitchMount"></div>
        <div id="rightAuthSlot"></div>
      </div>
    </div>

    <div class="form-page">
      <h1 data-i18n="create_channel">Kanal yaratish</h1>
      <div class="form-card">
        <div id="formMsg" class="form-msg"></div>

        <form id="channelForm">
          <div class="field">
            <label data-i18n="channel_name">Kanal nomi</label>
            <input type="text" id="channelName" required placeholder="Masalan: Ozodbek Vlogs">
          </div>
          <div class="field">
            <label data-i18n="channel_description">Kanal haqida</label>
            <textarea id="channelDescription" placeholder="Kanalingiz haqida qisqacha..."></textarea>
          </div>
          <div class="field">
            <label data-i18n="preview_image">Profil rasmi</label> <span style="color:var(--danger);">*</span>
            <div class="file-drop" id="photoDrop">
              <span data-i18n="choose_file">Faylni tanlang yoki shu yerga tashlang</span>
              <input type="file" id="photoInput" accept="image/*">
            </div>
          </div>
          <button type="submit" class="btn-primary" id="submitBtn" data-i18n="create_channel">Kanal yaratish</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script src="js/layout.js"></script>
<script src="js/create-channel.js"></script>
</body>
</html>
