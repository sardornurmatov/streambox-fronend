<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kategoriyalar — Admin — StreamBox</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo"><div class="logo-mark"></div>StreamBox</div>
    <div class="nav-group">
      <a href="home.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Bosh sahifa
      </a>
    </div>
    <div class="nav-group" id="authNavGroup" style="margin-top:auto;"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="logo"><div class="logo-mark"></div>StreamBox</div>
      </div>
      <div class="topbar-center"></div>
      <div class="topbar-right">
        <div id="rightAuthSlot"></div>
      </div>
    </div>

    <div class="form-page">
      <h1>Kategoriyalarni boshqarish</h1>
      <div id="accessDenied" style="display:none;" class="form-msg error">
        Bu sahifa faqat ADMIN hisoblar uchun. Sizda kirish huquqi yo'q.
      </div>

      <div id="adminArea" style="display:none;">
        <div class="form-card" style="margin-bottom:20px;">
          <div id="formMsg" class="form-msg"></div>
          <form id="categoryForm" style="display:flex; gap:10px;">
            <input type="text" id="categoryName" placeholder="Yangi kategoriya nomi (masalan: Musiqa)" required style="flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; color:var(--text); font-size:14px;">
            <button type="submit" class="btn-primary" style="width:auto; padding:0 22px;">+ Qo'shish</button>
          </form>
        </div>

        <div class="form-card">
          <h3 style="margin-top:0;font-size:15px;">Mavjud kategoriyalar</h3>
          <div id="categoryList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/admin-categories.js"></script>
</body>
</html>
