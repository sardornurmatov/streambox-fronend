<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sozlamalar — StreamBox</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo"><div class="logo-mark"></div>StreamBox</div>
    <div class="nav-group">
      <a href="home.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Bosh sahifa
      </a>
    </div>
    <div class="nav-group" id="authNavGroup" style="margin-top:auto;"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="logo"><div class="logo-mark"></div>StreamBox</div>
      </div>
      <div class="topbar-center"></div>
      <div class="topbar-right">
        <div id="langSwitchMount"></div>
        <div id="rightAuthSlot"></div>
      </div>
    </div>

    <div class="form-page">
      <h1>Sozlamalar</h1>

      <div class="form-card" style="margin-bottom:20px;">
        <h3 style="margin-top:0;font-size:15px;">Shaxsiy ma'lumotlar</h3>
        <div id="detailMsg" class="form-msg"></div>
        <div class="field">
          <label>Profil rasmi</label>
          <div class="file-drop" id="photoDrop">
            <span>Faylni tanlang yoki shu yerga tashlang</span>
            <input type="file" id="photoInput" accept="image/*">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Ism</label>
            <input type="text" id="firstName">
          </div>
          <div class="field">
            <label>Familiya</label>
            <input type="text" id="lastName">
          </div>
        </div>
        <button class="btn-primary" id="saveDetailBtn" style="width:auto;padding:0 22px;">Saqlash</button>
      </div>

      <div class="form-card" style="margin-bottom:20px;">
        <h3 style="margin-top:0;font-size:15px;">Emailni almashtirish</h3>
        <div id="emailMsg" class="form-msg"></div>
        <div id="emailStep1">
          <div class="field">
            <label>Yangi email</label>
            <input type="email" id="newEmail" placeholder="yangi@email.com">
          </div>
          <button class="btn-primary" id="requestEmailBtn" style="width:auto;padding:0 22px;">Tasdiqlash kodini yuborish</button>
        </div>
        <div id="emailStep2" style="display:none;margin-top:14px;">
          <div class="field">
            <label>Emailingizga yuborilgan kod</label>
            <input type="text" id="emailCode" maxlength="6" placeholder="123456">
          </div>
          <button class="btn-primary" id="confirmEmailBtn" style="width:auto;padding:0 22px;">Emailni tasdiqlash</button>
        </div>
      </div>

      <div class="form-card">
        <h3 style="margin-top:0;font-size:15px;">Parolni almashtirish</h3>
        <div id="passwordMsg" class="form-msg"></div>
        <div class="field">
          <label>Joriy parol</label>
          <input type="password" id="oldPassword">
        </div>
        <div class="field">
          <label>Yangi parol</label>
          <input type="password" id="newPassword" minlength="5">
        </div>
        <button class="btn-primary" id="savePasswordBtn" style="width:auto;padding:0 22px;">Parolni yangilash</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script src="js/layout.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
