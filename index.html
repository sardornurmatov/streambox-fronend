<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish — StreamBox | Video ulashish platformasi</title>
<meta name="description" content="StreamBox — video yuklash, tomosha qilish va kanal yuritish uchun platforma. Hisobingizga kiring va davom eting.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<meta property="og:type" content="website">
<meta property="og:site_name" content="StreamBox">
<meta property="og:title" content="StreamBox — Kirish">
<meta property="og:description" content="Video ulashish va tomosha qilish platformasi StreamBox'ga xush kelibsiz.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-visual">
    <div class="scanline"></div>
    <div class="logo">
      <div class="logo-mark"></div>
      StreamBox
    </div>
    <h1>Video ulashing.<br>Kanal boshqaring.<br>Auditoriyangizni toping.</h1>
    <p>O'z backendingizga ulangan video-platforma frontendi. Hisobingizga kiring va davom eting.</p>
  </div>

  <div class="auth-form-col">
    <div class="auth-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <a href="home.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13px;" data-i18n="back_home">← Bosh sahifaga qaytish</a>
        <div id="langSwitchMount"></div>
      </div>
      <div class="logo">
        <div class="logo-mark"></div>
        StreamBox
      </div>
      <h2 data-i18n="welcome_back">Xush kelibsiz</h2>
      <p class="sub" data-i18n="login_subtitle">Hisobingizga kirish uchun ma'lumotlarni kiriting</p>

      <div id="formMsg" class="form-msg"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email" data-i18n="email">Email</label>
          <input type="email" id="email" required placeholder="email@misol.com">
        </div>
        <div class="field">
          <label for="password" data-i18n="password">Parol</label>
          <input type="password" id="password" required placeholder="••••••••" minlength="5">
        </div>
        <button type="submit" class="btn-primary" id="submitBtn" data-i18n="login">Kirish</button>
      </form>

      <p class="auth-alt"><span data-i18n="no_account">Hisobingiz yo'qmi?</span> <a href="register.html" data-i18n="register">Ro'yxatdan o'tish</a></p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
