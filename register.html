<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ro'yxatdan o'tish — StreamBox</title>
<meta name="description" content="StreamBox'da yangi hisob yarating — video yuklang, kanal oching, tomosha qiling.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-visual">
    <div class="scanline"></div>
    <div class="logo">
      <div class="logo-mark"></div>
      StreamBox
    </div>
    <h1>Bir necha soniyada<br>hisob yarating.</h1>
    <p>Ro'yxatdan o'tgach, emailingizga yuborilgan 6 xonali kod bilan tasdiqlaysiz.</p>
  </div>

  <div class="auth-form-col">
    <div class="auth-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <a href="home.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13px;" data-i18n="back_home">← Bosh sahifaga qaytish</a>
        <div id="langSwitchMount"></div>
      </div>
      <div class="logo">
        <div class="logo-mark"></div>
        StreamBox
      </div>
      <h2 data-i18n="create_account">Hisob yaratish</h2>
      <p class="sub" data-i18n="register_subtitle">Ma'lumotlaringizni to'ldiring</p>

      <div id="formMsg" class="form-msg"></div>

      <form id="registerForm">
        <div class="field-row">
          <div class="field">
            <label for="name" data-i18n="first_name">Ism</label>
            <input type="text" id="name" required placeholder="Ism">
          </div>
          <div class="field">
            <label for="surname" data-i18n="last_name">Familiya</label>
            <input type="text" id="surname" required placeholder="Familiya">
          </div>
        </div>
        <div class="field">
          <label for="email" data-i18n="email">Email</label>
          <input type="email" id="email" required placeholder="email@misol.com">
        </div>
        <div class="field">
          <label for="password" data-i18n="password">Parol</label>
          <input type="password" id="password" required placeholder="Kamida 5 ta belgi" minlength="5">
        </div>
        <button type="submit" class="btn-primary" id="submitBtn" data-i18n="register">Ro'yxatdan o'tish</button>
      </form>

      <p class="auth-alt"><span data-i18n="have_account">Hisobingiz bormi?</span> <a href="index.html" data-i18n="login">Kirish</a></p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
