<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="upload_title">Video yuklash — StreamBox</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo"><div class="logo-mark"></div>StreamBox</div>
    <div class="nav-group">
      <a href="home.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span data-i18n="home">Bosh sahifa</span>
      </a>
    </div>
    <div class="nav-group" id="authNavGroup" style="margin-top:auto;"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo"><div class="logo-mark"></div>StreamBox</div>
      </div>
      <div class="topbar-center"></div>
      <div class="topbar-right">
        <div id="langSwitchMount"></div>
        <div id="rightAuthSlot"></div>
      </div>
    </div>

    <div class="form-page">
      <h1 data-i18n="upload_title">Video yuklash</h1>
      <div class="form-card">
        <div id="formMsg" class="form-msg"></div>
        <div id="noChannelMsg" style="display:none;" class="form-msg error">
          Video yuklashdan oldin kanal yaratishingiz kerak.
          <a href="create-channel.html" style="color:var(--accent);font-weight:600;">Kanal yaratish →</a>
        </div>

        <form id="uploadForm">
          <div class="field" id="channelPickerField" style="display:none;">
            <label>Kanal</label>
            <select id="channelSelect"></select>
          </div>

          <div class="field">
            <label data-i18n="video_title_label">Video sarlavhasi</label>
            <input type="text" id="videoTitle" required placeholder="Video sarlavhasini kiriting">
          </div>

          <div class="field">
            <label data-i18n="description">Tavsif</label>
            <textarea id="videoDescription" placeholder="Video haqida qisqacha ma'lumot..."></textarea>
          </div>

          <div class="field">
            <label data-i18n="category">Kategoriya</label>
            <select id="categorySelect" required></select>
          </div>

          <div class="field">
            <label data-i18n="preview_image">Muqova rasmi</label>
            <div class="file-drop" id="previewDrop">
              <span data-i18n="choose_file">Faylni tanlang yoki shu yerga tashlang</span>
              <input type="file" id="previewInput" accept="image/*">
            </div>
          </div>

          <div class="field">
            <label data-i18n="video_file">Video fayl</label>
            <div class="file-drop" id="videoDrop">
              <span data-i18n="choose_file">Faylni tanlang yoki shu yerga tashlang</span>
              <input type="file" id="videoInput" accept="video/*">
            </div>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn" data-i18n="publish">Nashr qilish</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/i18n.js"></script>
<script src="js/layout.js"></script>
<script src="js/upload.js"></script>
</body>
</html>
